<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#070B14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Stride — 14-Week Transformation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>⚡</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #070B14; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #B8FF57; font-size: 18px; font-weight: 700; }
    #loading .spinner { width: 28px; height: 28px; border: 3px solid rgba(184,255,87,0.2); border-top-color: #B8FF57; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading"><div class="spinner"></div>Loading Stride...</div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
