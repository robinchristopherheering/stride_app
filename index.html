  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body {
      background: #070B14;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow-x: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    ::-webkit-scrollbar { width: 0; height: 0; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #B8FF57; font-size: 18px; font-weight: 700; }
    #loading .spinner { width: 28px; height: 28px; border: 3px solid rgba(184,255,87,0.2); border-top-color: #B8FF57; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading"><div class="spinner"></div>Loading Stride...</div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/stride_app/sw.js')
          .then(reg => console.log('[Stride] SW registered:', reg.scope))
          .catch(err => console.log('[Stride] SW error:', err));
      });
    }
    window.updateThemeColor = (color) => {
      document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.content = color);
      document.body.style.background = color;
    };
  </script>
</body>
