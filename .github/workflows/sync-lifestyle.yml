name: Sync GQ Lifestyle Articles

on:
  schedule:
    # Runs daily at 07:00 UTC (08:00 CET)
    - cron: "0 7 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch GQ Fitness RSS
        run: python sync/sync_gq.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/lifestyle.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/lifestyle.json
          git commit -m "chore: sync GQ lifestyle articles [$(date -u +%Y-%m-%d)]"
          git push
