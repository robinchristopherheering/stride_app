name: Stride MFP Sync

on:
  schedule:
    # Every 4 hours for near-real-time data
    - cron: '30 */4 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Days to backfill (e.g. 36 to recover Mar 24 – Apr 28). Leave 0 for today only.'
        required: false
        default: '0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sync/requirements.txt

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run MFP sync
        env:
          MFP_USERNAME: ${{ secrets.MFP_USERNAME }}
          MFP_COOKIES: ${{ secrets.MFP_COOKIES }}
        run: |
          # Convert MFP_COOKIES secret (raw "name=value; ..." string) to Netscape cookie file
          python3 - <<'PYEOF'
          import os
          raw = os.environ.get("MFP_COOKIES", "")
          # Netscape format REQUIRES this exact first line (with the magic string)
          lines = ["# Netscape HTTP Cookie File\n", "# http://curl.haxx.se/rfc/cookie_spec.html\n", "# This is a generated file!  Do not edit.\n", "\n"]
          for pair in raw.split("; "):
              pair = pair.strip()
              if "=" in pair:
                  name, _, val = pair.partition("=")
                  # Format: domain, flag, path, secure, expiry, name, value (TAB-separated)
                  lines.append(f".myfitnesspal.com\tTRUE\t/\tTRUE\t1783091500\t{name.strip()}\t{val.strip()}\n")
          with open("/tmp/mfp_cookies.txt", "w") as f:
              f.writelines(lines)
          print(f"Wrote {len(lines)-4} cookies to /tmp/mfp_cookies.txt")
          PYEOF

          DAYS="${{ github.event.inputs.backfill_days }}"
          if [ -n "$DAYS" ] && [ "$DAYS" -gt 0 ]; then
            echo "Backfilling $DAYS days..."
            python sync/sync_mfp.py --backfill "$DAYS" --cookie-file /tmp/mfp_cookies.txt --data-dir public/data
          else
            python sync/sync_mfp.py --cookie-file /tmp/mfp_cookies.txt --data-dir public/data
          fi

      - name: Commit and push data
        run: |
          git config user.name "Stride Bot"
          git config user.email "stride-bot@users.noreply.github.com"
          git add public/data/stride-data.json
          git diff --cached --quiet || git commit -m "📊 Sync MFP data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
