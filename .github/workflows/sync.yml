name: Stride MFP Sync

on:
  schedule:
    # Every 4 hours for near-real-time data
    - cron: '30 */4 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: 'Days to backfill (e.g. 36 to recover Mar 24 – Apr 28). Leave 0 for today only.'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sync/requirements.txt

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run MFP sync
        env:
          MFP_USERNAME: ${{ secrets.MFP_USERNAME }}
          MFP_COOKIES: ${{ secrets.MFP_COOKIES }}
        run: |
          DAYS="${{ github.event.inputs.backfill_days }}"
          if [ -n "$DAYS" ] && [ "$DAYS" -gt 0 ]; then
            echo "Backfilling $DAYS days..."
            python sync/sync_mfp.py --backfill "$DAYS"
          else
            python sync/sync_mfp.py
          fi

      - name: Commit and push data
        run: |
          git config user.name "Stride Bot"
          git config user.email "stride-bot@users.noreply.github.com"
          git add public/data/stride-data.json
          git diff --cached --quiet || git commit -m "📊 Sync MFP data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
